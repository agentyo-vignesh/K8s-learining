apiVersion: apps/v1
kind: Deployment
metadata:
  name: startup-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: startup-demo
  template:
    metadata:
      labels:
        app: startup-demo
    spec:
      containers:
      - name: busybox
        image: busybox
        command:
        - sh
        - -c
        - |
          sleep 60
          touch /tmp/started
          sleep 3600
        startupProbe:
          exec:
            command:
            - cat
            - /tmp/started
          periodSeconds: 5
          failureThreshold: 20
        livenessProbe:
          exec:
            command:
            - cat
            - /tmp/started
          periodSeconds: 5
