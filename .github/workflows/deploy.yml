# Deploy static HTML to nginx (/var/www/html)
name: Deploy to nginx

# Trigger: deploy on every push to main
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allow manual runs from the Actions tab

jobs:
  deploy:
    # Runs on a self-hosted runner that lives on the nginx server
    runs-on: self-hosted
    steps:
      # Step 1: Pull the latest repo contents (your HTML files)
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Copy HTML into nginx's web root
      #   cp -r : copy everything recursively, overwriting existing files
      - name: Deploy files to /var/www/html
        run: |
          sudo cp -r ./*.html /usr/share/nginx/html/

      # Step 3: Validate config and reload nginx (zero-downtime)
      - name: Reload nginx
        run: |
          sudo nginx -t
          sudo systemctl reload nginx
