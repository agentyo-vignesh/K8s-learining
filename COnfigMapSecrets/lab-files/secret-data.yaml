# "data:" values must be BASE64-ENCODED yourself before writing them here.
apiVersion: v1
kind: Secret
metadata:
  name: db-cred-data
  namespace: cm-lab
type: Opaque             # Opaque = generic key/value secret (no special type)
data:
  DB_USER: YWRtaW4=              # base64 of "admin"
  DB_PASSWORD: UzNjcjN0IVBhc3M=  # base64 of "S3cr3t!Pass"

# HOW TO MAKE YOUR OWN: echo -n 'admin' | base64   (the -n matters, don't skip it!)
# TO DECODE:            echo 'YWRtaW4=' | base64 -d
# Compare with secret-stringdata.yaml, which lets Kubernetes do the encoding for you.
