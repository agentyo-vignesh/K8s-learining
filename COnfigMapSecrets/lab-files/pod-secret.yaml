# This pod shows a Secret used BOTH as an env var AND as mounted files.
apiVersion: v1
kind: Pod
metadata:
  name: secret-demo
  namespace: cm-lab
spec:
  containers:
    - name: demo
      image: busybox:1.36
      command: ["sh", "-c", "echo \"user=$DB_USER\" && sleep 3600"]

      # one specific secret key -> one env var (same pattern as ConfigMap env)
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials     # <- Secret created earlier with `kubectl create secret generic ...`
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-cred-data   # <- Secret created earlier with `kubectl create secret generic ...`
              key: DB_PASSWORD

      # the WHOLE secret -> mounted as files (one file per key)
      volumeMounts:
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true
  volumes:
    - name: secret-volume
      secret:
        secretName: db-credentials     # note: "secretName", not "name", for Secret volumes

# TRY IT: kubectl exec secret-demo -- cat /etc/secrets/DB_PASSWORD
#   -> file contents are the DECODED value (not base64)
