# "stringData:" takes PLAIN TEXT — Kubernetes base64-encodes it for you.
apiVersion: v1
kind: Secret
metadata:
  name: db-cred-string
  namespace: cm-lab
type: Opaque
stringData:
  DB_USER: admin
  DB_PASSWORD: S3cr3t!Pass

# TRY IT: kubectl get secret db-cred-string -o yaml
#   -> the values will show up already base64-encoded under "data:", not "stringData:"
# This is easier than secret-data.yaml — no manual `base64` step needed.
