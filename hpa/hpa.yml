# hpa.yaml - autoscaling/v2 API (latest)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: php-apache
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: php-apache
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  # Memory metric kooda add pannalam - v2 API multi-metric support
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  # Scale down behavior control (flapping avoid panna)
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60   # default 300s, demo-ku 60s vechukkalam
      policies:
      - type: Pods
        value: 1
        periodSeconds: 30