apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-nginx
  namespace: rbac-lab
  labels:
    app: demo-nginx
spec:
  replicas: 5
  selector:
    matchLabels:
      app: demo-nginx
  template:
    metadata:
      labels:
        app: demo-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "10m"
            memory: "16Mi"
          limits:
            cpu: "50m"
            memory: "64Mi"
